server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy delle chiamate API al backend Spring Boot
    location /api/ {
        proxy_pass http://app-koinsim:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: ogni route Angular serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
