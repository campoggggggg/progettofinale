services:

  db-koinsim:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: koinsim_db
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - koinsim_net

  redis-koinsim:
    image: redis:7
    container_name: redis_db
    ports:
      - "6379:6379"
    networks:
      - koinsim_net

  app-koinsim:
    build: .
    container_name: spring_app
    ports:
      - "8080:8080"
    depends_on:
      db-koinsim:
        condition: service_healthy
      redis-koinsim:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-koinsim:3306/koinsim_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_DATA_REDIS_HOST=redis-koinsim
      - SPRING_DATA_REDIS_PORT=6379
      # API keys (sovrascrivono application.properties in produzione)
      - COINGECKO_API_KEY=CG-qAsQKwSK8SwHu7Zv6FiWHgK2
      - ALPHA_VANTAGE_API_KEY=946KJ68RKR54P6YS
      # Market data
      - MARKET_DATA_CSV_PATH=/app/data
      - MARKET_DATA_REDIS_TTL_HOURS=24
    networks:
      - koinsim_net

  frontend-koinsim:
    build: ../frontend-koinsim
    container_name: angular_app
    ports:
      - "4200:80"
    depends_on:
      - app-koinsim
    networks:
      - koinsim_net

networks:
  koinsim_net:
    driver: bridge
